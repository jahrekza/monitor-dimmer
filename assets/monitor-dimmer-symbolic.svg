<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- monitor frame -->
  <rect x="1" y="2" width="20" height="14" rx="1.5" ry="1.5"
        fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- left half bright -->
  <rect x="1" y="2" width="10" height="14" rx="1.5" ry="1.5"
        fill="currentColor" opacity="0.9"/>
  <!-- right half dark -->
  <rect x="11" y="2" width="10" height="14" rx="1.5" ry="0"
        fill="currentColor" opacity="0.25"/>
  <!-- stand -->
  <line x1="8" y1="16" x2="14" y2="16" stroke="currentColor" stroke-width="1.5"/>
  <rect x="7" y="17.5" width="8" height="1.5" rx="0.75"
        fill="currentColor"/>
</svg>
